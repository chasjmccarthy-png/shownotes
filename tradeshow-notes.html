<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Conference Note Taker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #00e5a0;
    --accent2: #7b61ff;
    --warn: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --red: #ff4466;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  /* ── HEADER ── */
  header {
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(12px);
    z-index: 10;
    flex-direction: column;
  }
  .header-safe-area {
    width: 100%;
    height: env(safe-area-inset-top, 20px);
    min-height: 12px;
    background: transparent;
  }
  .header-content {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border);
  }
  .header-badge.loaded { color: var(--accent); border-color: rgba(0,229,160,0.3); }

  /* ── SECTIONS ── */
  .section { padding: 20px; }
  .section + .section { border-top: 1px solid var(--border); }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── UPLOAD ── */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(0,229,160,0.04); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 32px; margin-bottom: 10px; }
  .upload-zone p { color: var(--muted); font-size: 14px; }
  .upload-zone strong { color: var(--text); display: block; margin-bottom: 4px; }

  /* ── VOICE SEARCH ── */
  .voice-input-wrap { display: flex; gap: 8px; align-items: center; }
  .voice-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  .voice-input:focus { border-color: var(--accent2); }
  .voice-input::placeholder { color: var(--muted); }
  .mic-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; cursor: pointer;
    color: var(--muted); font-size: 18px; padding: 8px 10px;
    transition: all 0.2s; flex-shrink: 0; line-height: 1;
  }
  .mic-btn:hover { color: var(--accent); border-color: var(--accent); }
  .mic-btn.listening { color: var(--red); border-color: var(--red); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }

  /* ── MATCH CARD ── */
  /* ── MATCH LIST ── */
  .match-list {
    margin-top: 12px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeIn 0.2s ease;
  }
  .match-list-header {
    padding: 8px 14px;
    background: var(--surface2);
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase;
  }
  .match-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    gap: 10px;
  }
  .match-list-item:active, .match-list-item:hover { background: var(--surface2); }
  .match-item-left { flex: 1; min-width: 0; }
  .match-item-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .match-item-name em { color: var(--accent); font-style: normal; }
  .match-item-sub {
    font-size: 12px; color: var(--muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: 'DM Mono', monospace;
  }
  .match-item-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }

  /* confirmed card */
  .match-card {
    margin-top: 14px;
    background: var(--surface);
    border: 1.5px solid rgba(0,229,160,0.5);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
  }
  .match-header {
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,229,160,0.07);
  }
  .match-name { font-size: 17px; font-weight: 700; }
  .match-details { padding: 12px 16px; display: grid; gap: 6px; }
  .match-row {
    display: flex; gap: 8px;
    font-size: 13px; color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .match-row span:first-child { color: var(--accent2); min-width: 70px; }
  .match-row span:last-child { color: var(--text); }
  .match-actions { padding: 12px 16px; }
  .btn-sm {
    width: 100%; padding: 11px 12px; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    border: 1.5px solid; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-confirm { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-confirm:hover { opacity: 0.85; }
  .btn-skip { background: transparent; color: var(--muted); border-color: var(--border); margin-top: 8px; }
  .btn-skip:hover { color: var(--text); border-color: var(--text); }

  /* ── MEMO ── */
  .memo-area {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 120px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .memo-area:focus { border-color: var(--accent2); }
  .memo-area::placeholder { color: var(--muted); }
  .memo-area.recording { border-color: var(--red); }

  .memo-controls { display: flex; gap: 10px; margin-top: 12px; }
  .btn-memo {
    flex: 1; padding: 14px;
    border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    border: none; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-record {
    background: var(--surface2);
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-record.recording {
    background: rgba(255,68,102,0.15);
    color: var(--red);
    border-color: var(--red);
  }
  .btn-submit {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; flex: 2;
  }
  .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-submit:not(:disabled):hover { opacity: 0.88; transform: translateY(-1px); }


  /* ── QUICK TAGS ── */
  .quick-tags { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .connected-label {
    padding: 7px 12px; border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    border: 1.5px solid rgba(0,229,160,0.5); background: rgba(0,229,160,0.1);
    color: var(--accent); white-space: nowrap;
  }
  .followup-check {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    color: var(--muted); cursor: pointer; white-space: nowrap;
    padding: 7px 10px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--surface2);
    transition: all 0.15s;
  }
  .followup-check.checked {
    color: var(--accent2); border-color: rgba(123,97,255,0.5);
    background: rgba(123,97,255,0.1);
  }
  .followup-check input[type=checkbox] { display: none; }
  .check-box {
    width: 14px; height: 14px; border-radius: 3px;
    border: 1.5px solid var(--muted); display: flex; align-items: center;
    justify-content: center; font-size: 9px; flex-shrink: 0;
    transition: all 0.15s;
  }
  .followup-check.checked .check-box {
    background: var(--accent2); border-color: var(--accent2); color: #000;
  }


  /* ── STATUS ── */
  .status-bar {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .status-bar.show { display: flex; align-items: center; gap: 8px; }
  .status-bar.processing { background: rgba(123,97,255,0.12); color: var(--accent2); border: 1px solid rgba(123,97,255,0.3); }
  .status-bar.success { background: rgba(0,229,160,0.1); color: var(--accent); border: 1px solid rgba(0,229,160,0.3); }
  .status-bar.error { background: rgba(255,68,102,0.1); color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOG ── */
  .log-empty { text-align: center; padding: 32px 20px; color: var(--muted); font-size: 14px; }
  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    animation: slideIn 0.3s ease;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .log-item:hover { border-color: var(--border); }
  .log-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .log-name { font-size: 15px; font-weight: 700; }
  .log-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .log-summary { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
  .log-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .log-tag {
    font-family: 'DM Mono', monospace; font-size: 10px;
    padding: 3px 8px; border-radius: 20px;
    border: 1px solid;
  }
  .tag-action { color: var(--warn); border-color: rgba(255,107,53,0.4); background: rgba(255,107,53,0.08); }
  .tag-followup { color: var(--accent2); border-color: rgba(123,97,255,0.4); background: rgba(123,97,255,0.08); }
  .tag-topic { color: var(--accent); border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.06); }

  /* ── EXPORT BAR ── */
  .export-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,15,0.95); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex; gap: 10px; justify-content: center;
    max-width: 480px; margin: 0 auto;
  }
  .btn-export {
    padding: 11px 24px; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--text); cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  /* ── API KEY ── */
  .api-row {
    display: flex; gap: 8px; margin-bottom: 16px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 4px 4px 4px 14px;
    align-items: center;
  }
  .api-row input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 8px 0;
  }
  .api-row input::placeholder { color: var(--muted); }
  .btn-api-save {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; font-family: 'Syne', sans-serif;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-api-save:hover { border-color: var(--accent2); color: var(--accent2); }

  /* disabled state */
  .locked { opacity: 0.4; pointer-events: none; }

  /* modal overlay for expanded log item */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 100; display: flex; align-items: flex-end;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  .modal-sheet {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 20px; width: 100%; max-width: 480px; margin: 0 auto;
    max-height: 80dvh; overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .modal-company { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .modal-section-title {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--accent2); text-transform: uppercase; letter-spacing: 2px;
    margin: 14px 0 6px;
  }
  .modal-text { font-size: 14px; line-height: 1.6; color: var(--text); }
  .modal-list { padding-left: 18px; }
  .modal-list li { font-size: 14px; line-height: 1.7; color: var(--text); }
  .modal-close {
    display: block; width: 100%; margin-top: 20px;
    padding: 13px; border-radius: 12px;
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--muted); font-family: 'Syne', sans-serif; font-size: 15px;
    cursor: pointer;
  }
</style>
</head>

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.name.toLowerCase().endsWith('.pdf')) {
    handlePdfUpload(file);
  } else {
    handleExcelUpload(file);
  }
}

function handleExcelUpload(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const wb = XLSX.read(ev.target.result, { type: 'binary' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (!rows.length) { alert('No data found in file.'); return; }
    showColumnMapper(rows);
  };
  reader.readAsBinaryString(file);
}

async function handlePdfUpload(file) {
  if (!apiKey) { alert('Please enter your Anthropic API key first.'); return; }
  showStatus('Reading PDF with AI…', 'processing');
  document.getElementById('upload-zone').style.opacity = '0.6';

  const base64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });

  const prompt = `Extract all attendee/contact records from this PDF into a JSON array.
Each object should include any available fields such as: name, company, title, email, phone, and any other relevant fields.
Return ONLY a valid JSON array — no markdown, no backticks, no explanation.
Example: [{"name":"Jane Smith","company":"Acme Corp","title":"VP Sales","email":"j@acme.com","phone":""}]`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');

    let text = data.content.map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
    const rows = JSON.parse(text);
    if (!rows.length) throw new Error('No attendees found in PDF.');

    hideStatus();
    showColumnMapper(rows);
  } catch(err) {
    showStatus('PDF error: ' + err.message, 'error');
    document.getElementById('upload-zone').style.opacity = '1';
  }
}

function showColumnMapper(rows) {
  const cols = Object.keys(rows[0]);
  const wrap = document.getElementById('col-map-wrap');

  // Auto-detect common column names
  const guess = (hints) => cols.find(c => hints.some(h => c.toLowerCase().includes(h))) || '';
  columnMap = {
    name: guess(['name','full','attendee','first']),
    company: guess(['company','org','employer','firm']),
    title: guess(['title','role','position','job']),
    email: guess(['email','mail']),
    phone: guess(['phone','mobile','cell']),
  };

  let html = `<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:1px;">MAP COLUMNS (auto-detected)</div>`;
  const fields = ['name','company','title','email','phone'];
  const labels = ['Name *','Company','Title','Email','Phone'];
  html += `<div style="display:grid;gap:8px;">`;
  fields.forEach((f,i) => {
    html += `<div style="display:flex;align-items:center;gap:10px;">
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent2);min-width:60px;">${labels[i]}</span>
      <select id="col_${f}" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;">
        <option value="">— skip —</option>
        ${cols.map(c => `<option value="${c}" ${c===columnMap[f]?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>`;
  });
  html += `</div>`;
  html += `<button onclick="confirmColumns()" style="margin-top:12px;width:100%;padding:11px;border-radius:10px;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;">Load ${rows.length} Attendees</button>`;

  wrap.innerHTML = html;
  wrap.style.display = 'block';
  wrap._rows = rows;
}

function confirmColumns() {
  const rows = document.getElementById('col-map-wrap')._rows;
  const fields = ['name','company','title','email','phone'];
  fields.forEach(f => { columnMap[f] = document.getElementById('col_'+f).value; });
  if (!columnMap.name) { alert('Please map the Name column.'); return; }

  attendees = rows.map(r => ({
    name: r[columnMap.name] || '',
    company: r[columnMap.company] || '',
    title: r[columnMap.title] || '',
    email: r[columnMap.email] || '',
    phone: r[columnMap.phone] || '',
    _raw: r
  })).filter(a => a.name);

  // badge removed
  document.getElementById('find-section').classList.remove('locked');
  document.getElementById('col-map-wrap').style.display = 'none';
  document.querySelector('.upload-zone').style.opacity = '0.5';
  showStatus(`${attendees.length} attendees loaded`, 'success');
}

function expandNickname(word) {
  const lower = word.toLowerCase();
  return NICKNAMES[lower] ? [lower, NICKNAMES[lower]] : [lower];
}

function fuzzyScore(queryRaw, fullName) {
  const q = queryRaw.toLowerCase();
  const b = fullName.toLowerCase();

  // Exact substring match = top score
  if (b.includes(q)) return 100;

  const qWords = q.split(/\s+/);
  const bWords = b.split(/\s+/);
  let score = 0;

  qWords.forEach(qw => {
    const variants = expandNickname(qw); // e.g. ['joe','joseph']
    bWords.forEach(bw => {
      variants.forEach(v => {
        if (bw === v) { score += 60; }               // exact word match (incl. expanded)
        else if (bw.startsWith(v)) { score += 45; }  // bw starts with expanded
        else if (v.startsWith(bw)) { score += 35; }  // typed prefix of expanded
        else if (bw.startsWith(qw)) { score += 40; } // typed prefix of actual word
      });
    });
  });

  // char overlap fallback
  let charMatches = 0;
  for (let c of q) if (b.includes(c)) charMatches++;
  score += Math.floor((charMatches / Math.max(q.length,1)) * 20);

  return score;
}

function findTopMatches(query, limit=6) {
  if (!query || query.length < 3) return [];
  const scored = attendees.map(a => ({ attendee: a, score: fuzzyScore(query, a.name) }))
    .filter(m => m.score > 20)
    .sort((a,b) => b.score - a.score)
    .slice(0, limit);
  return scored;
}

function highlightMatch(name, query) {
  const q = query.toLowerCase();
  const n = name.toLowerCase();
  let result = '';
  let i = 0;
  while (i < name.length) {
    if (n.slice(i).startsWith(q)) {
      result += `<em>${name.slice(i, i+q.length)}</em>`;
      i += q.length;
    } else {
      result += name[i++];
    }
  }
  return result;
}

let searchDebounce;
function onNameInput(val) {
  clearTimeout(searchDebounce);
  if (confirmedAttendee) return; // locked in, don't re-search
  // Check if re-entering a name to add notes to an existing stub
  
  searchDebounce = setTimeout(() => showMatches(val), 200);
}

function showMatches(query) {
  const res = document.getElementById('match-result');
  if (!query || query.length < 4) { res.innerHTML = ''; return; }
  const matches = findTopMatches(query);
  if (!matches.length) {
    res.innerHTML = `<div style="color:var(--muted);font-size:13px;margin-top:10px;font-family:'DM Mono',monospace;padding:4px 0;">No matches found</div>`;
    return;
  }
  const items = matches.map((m, i) => {
    const a = m.attendee;
    const hl = highlightMatch(a.name, query);
    const sub = [a.title, a.company].filter(Boolean).join(' · ');
    return `<div class="match-list-item" onclick="selectAttendee(${i})">
      <div class="match-item-left">
        <div class="match-item-name">${hl}</div>
        ${sub ? `<div class="match-item-sub">${sub}</div>` : ''}
      </div>
      <span class="match-item-arrow">›</span>
    </div>`;
  }).join('');
  res.innerHTML = `<div class="match-list">
    <div class="match-list-header">${matches.length} possible match${matches.length>1?'es':''}</div>
    ${items}
  </div>`;
  res._matches = matches;
}

function selectAttendee(idx) {
  const res = document.getElementById('match-result');
  const matches = res._matches;
  if (!matches || !matches[idx]) return;
  const a = matches[idx].attendee;

  res.innerHTML = `<div class="match-card">
    <div class="match-header">
      <span class="match-name">✓ ${a.name}</span>
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent)">confirmed</span>

}

async function logConnection() {
  if (!confirmedAttendee) return;
  const btn = document.getElementById('connect-btn');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.35'; }

  // Check if this person already has a record — if so, open it for update
  const existing = interactions.findIndex(i => 
    i.attendee.email && confirmedAttendee.email 
      ? i.attendee.email === confirmedAttendee.email 
      : i.attendee.name === confirmedAttendee.name
  );

  if (existing >= 0) {
    // Open existing record for editing
    openModalForEdit(existing);
    return;
  }

  // Save stub record instantly
  const stub = {
    id: Date.now(),
    timestamp: new Date().toISOString(),
    attendee: {
      name: confirmedAttendee.name,
      company: confirmedAttendee.company || '',
      title: confirmedAttendee.title || '',
      email: confirmedAttendee.email || '',
      phone: confirmedAttendee.phone || '',
    },
    tag: 'followup',
    raw_note: '',
    summary: '',
    topics_of_interest: [],
    action_items: [],
    follow_up_required: true,
    follow_up_notes: ''
  };

  interactions.unshift(stub);
  localStorage.setItem('sn_interactions', JSON.stringify(interactions));
  renderLog();
  exportJSON();

  // Flash confirmation then reset
  showStatus('⚡ Connected — ' + confirmedAttendee.name, 'success');
  setTimeout(() => {
    resetSearch();
    hideStatus();
  }, 1200);
}

// ── SPEECH RECOGNITION ────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function toggleSearchMic() {
  if (!SpeechRecognition) { alert('Speech recognition not supported in this browser.'); return; }
  if (isSearchListening) {
    searchRecognition.stop(); return;
  }
  searchRecognition = new SpeechRecognition();
  searchRecognition.continuous = false;
  searchRecognition.interimResults = true;
  searchRecognition.lang = 'en-US';
  searchRecognition.onstart = () => {
    isSearchListening = true;
    document.getElementById('search-mic').classList.add('listening');
  };
  searchRecognition.onresult = e => {
    const t = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('name-input').value = t;
    onNameInput(t);
  };
  searchRecognition.onend = () => {
    isSearchListening = false;
    document.getElementById('search-mic').classList.remove('listening');
  };
  searchRecognition.start();
}

function toggleMemoRecord() {
  if (!SpeechRecognition) { alert('Speech recognition not supported in this browser.'); return; }
  if (isMemoListening) {
    memoRecognition.stop(); return;
  }
  memoRecognition = new SpeechRecognition();
  memoRecognition.continuous = true;
  memoRecognition.interimResults = true;
  memoRecognition.lang = 'en-US';
  let base = document.getElementById('memo-text').value;
  memoRecognition.onstart = () => {
    isMemoListening = true;
    const btn = document.getElementById('memo-btn');
    btn.textContent = '⏹ Stop'; btn.classList.add('recording');
    document.getElementById('memo-text').classList.add('recording');
  };
  memoRecognition.onresult = e => {
    let interim = '';
    let final = base;
    for (let r of e.results) {
      if (r.isFinal) final += r[0].transcript + ' ';
      else interim += r[0].transcript;
    }
    base = final;
    document.getElementById('memo-text').value = final + interim;
  };
  memoRecognition.onend = () => {
    isMemoListening = false;
    const btn = document.getElementById('memo-btn');

// ── QUICK TAGS ──────────────────────────────────────
let followUpChecked = true;  // default on

function toggleFollowUp() {
  followUpChecked = !followUpChecked;
  renderTagState();
}


function renderTagState() {
  const fu = document.getElementById('tag-followup');
  if (!fu) return;
  fu.className = 'followup-check' + (followUpChecked ? ' checked' : '');
  fu.innerHTML = `<span class="check-box">${followUpChecked ? '✓' : ''}</span>`;
}

function getTagValue() {
  return followUpChecked ? 'followup' : 'connected';
}

function resetTags() {
  followUpChecked = true;
  renderTagState();
}

async function submitNote() {
  const rawNote = document.getElementById('memo-text').value.trim();
  if (!apiKey) { showStatus('Enter your Anthropic API key above.', 'error'); return; }
  if (!confirmedAttendee) { showStatus('No attendee confirmed.', 'error'); return; }

  document.getElementById('save-btn').disabled = true;
  showStatus('Processing with AI…', 'processing');

  const tagVal = getTagValue();
  const tagLabel = tagVal === 'followup' ? 'Follow Up' : 'Connected';
  const promptNote = rawNote || '(No notes — quick check-in only)';
  const prompt = `You are a trade show assistant. Structure this raw interaction note into clean JSON.

Attendee: ${confirmedAttendee.name}
Company: ${confirmedAttendee.company || 'N/A'}
Title: ${confirmedAttendee.title || 'N/A'}
Tag: ${tagLabel}

Raw note: "${promptNote}"

Return ONLY valid JSON (no markdown, no backticks) with exactly these keys:
{
  "summary": "2-3 sentence summary of the discussion",
  "topics_of_interest": ["topic1", "topic2"],
  "action_items": ["action1", "action2"],
  "follow_up_required": true or false,
  "follow_up_notes": "what follow-up is needed, or empty string"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');

    let text = data.content.map(b => b.text || '').join('');
    text = text.replace(/```json|```/g, '').trim();
    const structured = JSON.parse(text);

    const interaction = {
      id: Date.now(),
      timestamp: new Date().toISOString(),
      attendee: {
        name: confirmedAttendee.name,
        company: confirmedAttendee.company,
        title: confirmedAttendee.title,
        email: confirmedAttendee.email,
        phone: confirmedAttendee.phone,
      },
      tag: tagVal,
      raw_note: rawNote || '',
      ...structured
    };

    interactions.unshift(interaction);
    localStorage.setItem('sn_interactions', JSON.stringify(interactions));
    renderLog();
    showStatus('Saved ✓  —  auto-exporting…', 'success');
    setTimeout(() => exportJSON(), 400);

    setTimeout(() => { resetSearch(); hideStatus(); }, 1800);

  } catch(err) {
    showStatus('Error: ' + err.message, 'error');
    document.getElementById('save-btn').disabled = false;
  }
}

// ── LOG RENDERING ────────────────────────────────────
function renderLog() {
  const list = document.getElementById('log-list');
  if (!interactions.length) {
    list.innerHTML = '<div class="log-empty">No interactions recorded yet</div>';
    return;
  }
  list.innerHTML = interactions.map((it,i) => {
    const t = new Date(it.timestamp);
    const time = t.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const topicTags = (it.topics_of_interest||[]).slice(0,3).map(t=>`<span class="log-tag tag-topic">${t}</span>`).join('');
    const actionTag = (it.action_items||[]).length ? `<span class="log-tag tag-action">${it.action_items.length} action${it.action_items.length>1?'s':''}</span>` : '';
    const followTag = it.follow_up_required ? `<span class="log-tag tag-followup">follow-up</span>` : '';
    const quickTag = it.tag === 'followup'
      ? `<span class="log-tag tag-followup">✓ Follow Up</span>`
      : `<span class="log-tag" style="color:var(--accent);border-color:rgba(0,229,160,0.3);background:rgba(0,229,160,0.06);">✓ Connected</span>`;
    return `<div class="log-item" onclick="openModal(${i})">
      <div class="log-top">
        <div>
          <div class="log-name">${it.attendee.name}</div>
          ${it.attendee.company ? `<div style="font-size:12px;color:var(--muted);margin-top:2px;">${it.attendee.company}</div>` : ''}
        </div>
        <div class="log-time">${time}</div>
      </div>
      <div class="log-summary">${it.summary||''}</div>
      <div class="log-tags">${quickTag}${topicTags}${actionTag}</div>
    </div>`;
  }).join('');
}

function openModal(i) {
  const it = interactions[i];
  const sheet = document.getElementById('modal-sheet');
  const actions = (it.action_items||[]).map(a=>`<li>${a}</li>`).join('');
  const topics = (it.topics_of_interest||[]).map(t=>`<li>${t}</li>`).join('');
  const hasNotes = it.summary || it.raw_note;
  sheet.innerHTML = `
    <div class="modal-title">${it.attendee.name}</div>
    <div class="modal-company">${[it.attendee.title,it.attendee.company].filter(Boolean).join(' · ')}</div>
    ${it.summary ? `<div class="modal-section-title">Summary</div><div class="modal-text">${it.summary}</div>` : ''}
    ${topics ? `<div class="modal-section-title">Topics of Interest</div><ul class="modal-list">${topics}</ul>` : ''}
    ${actions ? `<div class="modal-section-title">Action Items</div><ul class="modal-list">${actions}</ul>` : ''}
    ${it.follow_up_required ? `<div class="modal-section-title">Follow-Up</div><div class="modal-text">${it.follow_up_notes||'Required'}</div>` : ''}
    ${it.raw_note ? `<div class="modal-section-title">Raw Note</div><div class="modal-text" style="color:var(--muted)">${it.raw_note}</div>` : ''}

async function processMemoUpdate(i) {
  const rawNote = document.getElementById('edit-memo').value.trim();
  if (!rawNote) { 
    interactions[i].raw_note = '';
    localStorage.setItem('sn_interactions', JSON.stringify(interactions));
    renderLog(); exportJSON();
    document.getElementById('modal').style.display = 'none';
    return;
  }
  if (!apiKey) { alert('Enter your Anthropic API key in Settings first.'); return; }

  const it = interactions[i];
  const saveBtn = document.querySelector('#modal-sheet button');
  if (saveBtn) { saveBtn.textContent = '⏳ Processing…'; saveBtn.disabled = true; }

  const prompt = `You are a trade show assistant. Structure this raw interaction note into clean JSON.

Attendee: ${it.attendee.name}
Company: ${it.attendee.company || 'N/A'}
Title: ${it.attendee.title || 'N/A'}

Raw note: "${rawNote}"

Return ONLY valid JSON (no markdown, no backticks) with exactly these keys:
{
  "summary": "2-3 sentence summary of the discussion",
  "topics_of_interest": ["topic1", "topic2"],
  "action_items": ["action1", "action2"],
  "follow_up_required": true or false,
  "follow_up_notes": "what follow-up is needed, or empty string"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'API error');
    let text = data.content.map(b => b.text || '').join('');
    text = text.replace(/```json|```/g, '').trim();
    const structured = JSON.parse(text);
    interactions[i] = { ...interactions[i], raw_note: rawNote, ...structured };

function emailNotes() {
  if (!interactions.length) { showStatus('No interactions to export.', 'error'); return; }
  const body = JSON.stringify(interactions, null, 2);
  const subject = encodeURIComponent('FL Innovation Day Notes — ' + new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}));
  const bodyEncoded = encodeURIComponent(body);
  window.location.href = `mailto:c.mccarthy@ibm.com?subject=${subject}&body=${bodyEncoded}`;
}

function exportJSON() {
  if (!interactions.length) { showStatus('No interactions to export.', 'error'); return; }
  const blob = new Blob([JSON.stringify(interactions, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `shownotes_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function clearLog() {
  if (!confirm('Clear all interactions? This cannot be undone.')) return;
  interactions = [];
  localStorage.removeItem('sn_interactions');
  renderLog();
}

// Match an attendee's company/email to an org brief
function findOrgBrief(attendee) {
  if (!attendee) return null;
  const name = (attendee.name || '').toLowerCase();
  const company = (attendee.company || '').toLowerCase();
  const email = (attendee.email || '').toLowerCase();

  for (const org of ORGS) {
    // Check keyPeople by email first (most reliable)
    if (org.keyPeople && org.keyPeople.some(p => p.email && email && p.email.toLowerCase() === email)) {
      return { org, person: org.keyPeople.find(p => p.email && p.email.toLowerCase() === email) };
    }
  }
  // Fallback: fuzzy company name match
  for (const org of ORGS) {
    const orgName = org.name.toLowerCase();
    // Check if org name appears in company or vice versa
    const companyWords = company.split(/[\s,\/&-]+/).filter(w => w.length > 3);
    const orgWords = orgName.split(/[\s,\/&-]+/).filter(w => w.length > 3);
    const overlap = companyWords.filter(w => orgWords.some(ow => ow.includes(w) || w.includes(ow)));
    if (overlap.length >= 1 && company.length > 3) {
      return { org, person: null };
    }
  }
  return null;
}

function showOrgBrief(attendee) {
  const result = findOrgBrief(attendee);
  const panel = document.getElementById('brief-panel');
  if (!result) { panel.style.display = 'none'; return; }

  const { org, person } = result;
  const priorityColors = { high: '#ff6b35', active: '#00e5a0', medium: '#f0c040', prospect: '#6b6b85' };
  const priorityLabels = { high: 'High Priority', active: 'Active Account', medium: 'Medium Opp', prospect: 'Prospect' };
  const pColor = priorityColors[org.priority] || '#6b6b85';
  const pLabel = priorityLabels[org.priority] || org.priority;

  // Key person note (shown by default)
  const personHTML = person && person.note ? `
    <div style="background:rgba(123,97,255,0.1);border:1px solid rgba(123,97,255,0.3);border-radius:8px;padding:10px 12px;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">⭐ Key Person Note</div>
      <div style="font-size:13px;color:var(--text);line-height:1.5;">${person.note}</div>
    </div>` : `
    <div style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;">No specific note for this person.</div>`;

  // Talking points (hidden by default, toggled)
  const tpHTML = (org.talkingPoints || []).map(tp =>
    `<div style="padding:8px 10px 8px 28px;position:relative;font-size:12px;color:var(--muted);line-height:1.5;border-bottom:1px solid var(--border);">
      <span style="position:absolute;left:10px;color:var(--accent);font-weight:700;">→</span>
      ${tp.replace(/<[^>]+>/g,'')}
    </div>`
  ).join('');

  panel.style.display = 'block';
  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:20px;">${org.icon}</span>
        <div>
          <div style="font-size:14px;font-weight:800;">${org.name}</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:${pColor};letter-spacing:1px;margin-top:1px;">${pLabel}</div>
        </div>
      </div>
      <button onclick="document.getElementById('brief-panel').style.display='none'"
        style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:13px;padding:4px 8px;">✕</button>
    </div>

    ${personHTML}

    <button onclick="toggleTalkingPoints()" id="tp-toggle-btn"
      style="margin-top:10px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
             padding:9px 14px;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
             cursor:pointer;display:flex;align-items:center;justify-content:space-between;">
      <span>💡 Talking Points (${(org.talkingPoints||[]).length})</span>
      <span id="tp-chevron" style="font-size:14px;">›</span>
    </button>
    <div id="tp-drawer" style="display:none;margin-top:6px;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
      ${tpHTML}
    </div>`;
}

function toggleTalkingPoints() {
  const drawer = document.getElementById('tp-drawer');
  const chevron = document.getElementById('tp-chevron');
  const open = drawer.style.display === 'none';
  drawer.style.display = open ? 'block' : 'none';
  chevron.style.transform = open ? 'rotate(90deg)' : '';
  chevron.style.transition = 'transform 0.2s';
}
